<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0b0d17" />
<title>Figurinhas · Scanner Copa 2026</title>
<link rel="manifest" href="manifest-figurinhas.json" />
<link rel="apple-touch-icon" href="assets/logo-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<style>
  :root{
    --bg:#0b0d17; --card:#12152a; --card2:#171a32;
    --line:rgba(255,255,255,.08); --txt:#e8eaf6; --muted:#9aa0c3;
    --grad:linear-gradient(135deg,#6c5ce7,#00cec9);
    --purple:#6c5ce7; --cyan:#00cec9; --green:#26d07c; --red:#ff5e7d; --gold:#ffb02e;
    --r:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--txt);
    font-family:'Plus Jakarta Sans',system-ui,sans-serif;
    -webkit-tap-highlight-color:transparent;
    padding-bottom:90px;
  }
  h1,h2,h3,.num{font-family:'Space Grotesk',sans-serif}
  .wrap{max-width:760px;margin:0 auto;padding:16px}

  /* Header */
  header{
    position:sticky;top:0;z-index:20;
    background:rgba(11,13,23,.85);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
  }
  .hd{display:flex;align-items:center;gap:12px;padding:14px 16px;max-width:760px;margin:0 auto}
  .logo{width:38px;height:38px;border-radius:11px;background:var(--grad);
    display:grid;place-items:center;color:#fff;font-size:18px;flex:0 0 auto}
  .hd h1{font-size:18px;margin:0;line-height:1.1}
  .hd small{color:var(--muted);font-size:12px}
  .hd .gear{margin-left:auto;background:var(--card);border:1px solid var(--line);
    color:var(--txt);width:40px;height:40px;border-radius:12px;font-size:16px;cursor:pointer}

  /* Stats */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 12px;text-align:center}
  .stat .v{font-size:24px;font-weight:700}
  .stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
  .stat.have .v{color:var(--green)} .stat.miss .v{color:var(--red)} .stat.rep .v{color:var(--gold)}
  .progress{height:8px;border-radius:99px;background:var(--card2);overflow:hidden;margin:4px 0 18px}
  .progress > i{display:block;height:100%;background:var(--grad);width:0;transition:width .4s}

  /* Buttons */
  .btn{border:0;border-radius:14px;padding:14px 16px;font-weight:600;font-size:15px;
    cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;gap:8px}
  .btn-grad{background:var(--grad);color:#fff}
  .btn-ghost{background:var(--card);color:var(--txt);border:1px solid var(--line)}
  .btn-block{width:100%}
  .btn:active{transform:scale(.98)}
  .btn:disabled{opacity:.5;cursor:default}

  .scan-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}

  /* Camera / preview */
  .stage{position:relative;border-radius:var(--r);overflow:hidden;background:#000;
    border:1px solid var(--line);aspect-ratio:3/4;display:none}
  .stage.on{display:block}
  .stage video,.stage img{width:100%;height:100%;object-fit:cover;display:block}
  .stage .cap{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
    width:64px;height:64px;border-radius:50%;background:#fff;border:4px solid rgba(255,255,255,.4);cursor:pointer}
  .stage .close{position:absolute;top:10px;right:10px;width:38px;height:38px;border-radius:50%;
    background:rgba(0,0,0,.5);color:#fff;border:0;font-size:16px;cursor:pointer}

  /* OCR progress */
  .ocr{display:none;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);
    border-radius:var(--r);padding:14px;margin-bottom:14px;color:var(--muted);font-size:14px}
  .ocr.on{display:flex}
  .ocr .spin{width:18px;height:18px;border:3px solid var(--line);border-top-color:var(--cyan);
    border-radius:50%;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* Confirm panel */
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:16px;display:none}
  .panel.on{display:block}
  .panel h3{margin:0 0 4px;font-size:16px}
  .panel .hint{color:var(--muted);font-size:13px;margin:0 0 12px}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;min-height:10px}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--line);
    border-radius:99px;padding:7px 10px 7px 13px;font-weight:600;font-family:'Space Grotesk'}
  .chip.dup{border-color:var(--gold);color:var(--gold)}
  .chip x{cursor:pointer;color:var(--muted);font-style:normal;font-size:15px;line-height:1}
  .chip x:hover{color:var(--red)}
  .addrow{display:flex;gap:8px;margin-bottom:14px}
  .addrow input{flex:1;background:var(--bg);border:1px solid var(--line);color:var(--txt);
    border-radius:12px;padding:12px;font-size:16px;font-family:'Space Grotesk'}
  .addrow input:focus{outline:none;border-color:var(--purple)}

  /* Filters */
  .filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px}
  .filters button{flex:0 0 auto;background:var(--card);border:1px solid var(--line);color:var(--muted);
    border-radius:99px;padding:9px 15px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
  .filters button.active{background:var(--grad);color:#fff;border-color:transparent}

  /* Grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(54px,1fr));gap:8px}
  .cell{aspect-ratio:1;border-radius:12px;display:grid;place-items:center;font-family:'Space Grotesk';
    font-weight:600;font-size:14px;background:var(--card2);border:1px solid var(--line);color:var(--muted);
    cursor:pointer;position:relative;user-select:none}
  .cell.have{background:rgba(38,208,124,.14);border-color:rgba(38,208,124,.5);color:#7ef0b4}
  .cell.have .badge{position:absolute;top:-5px;right:-5px;background:var(--gold);color:#1a1300;
    font-size:10px;font-weight:700;border-radius:99px;min-width:18px;height:18px;display:grid;place-items:center;padding:0 4px}
  .cell:active{transform:scale(.92)}

  /* Floating share bar */
  .sharebar{position:fixed;left:0;right:0;bottom:0;z-index:30;
    background:rgba(11,13,23,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line);
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));}
  .sharebar .in{max-width:760px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:10px}

  /* Modal */
  .modal{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;padding:20px}
  .modal.on{display:flex}
  .modal .box{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:20px;max-width:420px;width:100%}
  .modal h3{margin:0 0 14px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
  .field input{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--txt);border-radius:12px;padding:12px;font-size:16px}
  .modal-actions{display:flex;gap:10px;margin-top:6px}

  /* Toast */
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);
    background:#1d2140;border:1px solid var(--line);color:var(--txt);padding:12px 18px;border-radius:99px;
    font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:.3s;z-index:60;white-space:nowrap}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

  .empty{text-align:center;color:var(--muted);padding:30px 10px;font-size:14px}
</style>
</head>
<body>

<header>
  <div class="hd">
    <div class="logo"><i class="fa-solid fa-id-card-clip"></i></div>
    <div>
      <h1 id="albumName">Copa do Mundo 2026</h1>
      <small id="albumSub">Coleção de figurinhas</small>
    </div>
    <button class="gear" id="btnSettings" title="Configurações"><i class="fa-solid fa-gear"></i></button>
  </div>
</header>

<div class="wrap">

  <!-- Stats -->
  <div class="stats">
    <div class="stat have"><div class="v" id="stHave">0</div><div class="l">Tenho</div></div>
    <div class="stat miss"><div class="v" id="stMiss">0</div><div class="l">Faltam</div></div>
    <div class="stat rep"><div class="v" id="stRep">0</div><div class="l">Repetidas</div></div>
  </div>
  <div class="progress"><i id="bar"></i></div>

  <!-- Scan -->
  <div class="scan-actions">
    <button class="btn btn-grad" id="btnCamera"><i class="fa-solid fa-camera"></i> Escanear câmera</button>
    <button class="btn btn-ghost" id="btnFile"><i class="fa-solid fa-image"></i> Escolher foto</button>
  </div>
  <input type="file" id="fileInput" accept="image/*" capture="environment" hidden />

  <div class="stage" id="stage">
    <video id="video" playsinline autoplay muted></video>
    <button class="close" id="btnCloseCam"><i class="fa-solid fa-xmark"></i></button>
    <button class="cap" id="btnCapture" title="Tirar foto"></button>
  </div>

  <div class="ocr" id="ocrBox">
    <div class="spin"></div>
    <span id="ocrText">Lendo os números da figurinha…</span>
  </div>

  <!-- Confirm -->
  <div class="panel" id="confirm">
    <h3>Confere os números <i class="fa-solid fa-circle-check" style="color:var(--cyan)"></i></h3>
    <p class="hint">Toque no <b>×</b> pra remover o que leu errado e digite os que faltaram. Quem você já tem aparece em <span style="color:var(--gold)">dourado</span> (vira repetida).</p>
    <div class="chips" id="chips"></div>
    <div class="addrow">
      <input type="number" id="addNum" inputmode="numeric" placeholder="Adicionar nº manualmente" min="1" />
      <button class="btn btn-ghost" id="btnAdd"><i class="fa-solid fa-plus"></i></button>
    </div>
    <button class="btn btn-grad btn-block" id="btnSave"><i class="fa-solid fa-floppy-disk"></i> Salvar na coleção</button>
  </div>

  <!-- Filters + grid -->
  <div class="filters" id="filters">
    <button data-f="all" class="active">Todas</button>
    <button data-f="have">Tenho</button>
    <button data-f="miss">Faltam</button>
    <button data-f="rep">Repetidas</button>
  </div>
  <div class="grid" id="grid"></div>

</div>

<!-- Share bar -->
<div class="sharebar">
  <div class="in">
    <button class="btn btn-ghost" id="btnShareMiss"><i class="fa-solid fa-share-nodes"></i> Faltam</button>
    <button class="btn btn-ghost" id="btnShareRep"><i class="fa-solid fa-repeat"></i> Troco (repetidas)</button>
  </div>
</div>

<!-- Settings modal -->
<div class="modal" id="settings">
  <div class="box">
    <h3>Configurações</h3>
    <div class="field">
      <label>Nome do álbum</label>
      <input type="text" id="setName" />
    </div>
    <div class="field">
      <label>Total de figurinhas (numeração 1 até…)</label>
      <input type="number" id="setTotal" min="1" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="btnReset" style="color:var(--red)"><i class="fa-solid fa-trash"></i></button>
      <button class="btn btn-ghost btn-block" id="btnCancelSet">Cancelar</button>
      <button class="btn btn-grad btn-block" id="btnSaveSet">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- OCR engine -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
(function(){
  "use strict";

  /* ---------- Estado ---------- */
  var KEY = "figurinhas_copa2026";
  var state = load();

  function load(){
    try{
      var s = JSON.parse(localStorage.getItem(KEY));
      if(s && s.owned) return s;
    }catch(e){}
    return { name:"Copa do Mundo 2026", total:700, owned:{} }; // owned = { "12": 2 } -> tenho 2 (1 repetida)
  }
  function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }

  /* ---------- Helpers ---------- */
  var $ = function(id){ return document.getElementById(id); };
  var pending = [];   // números aguardando confirmação
  var filter = "all";
  var stream = null;

  function toast(msg){
    var t = $("toast"); t.textContent = msg; t.classList.add("on");
    clearTimeout(toast._t); toast._t = setTimeout(function(){ t.classList.remove("on"); }, 2200);
  }

  function counts(){
    var have=0, rep=0;
    for(var k in state.owned){
      var n = state.owned[k];
      if(n>0){ have++; rep += (n-1); }
    }
    return { have:have, miss: state.total - have, rep:rep };
  }

  function missingList(){
    var out=[];
    for(var i=1;i<=state.total;i++){ if(!state.owned[i]) out.push(i); }
    return out;
  }
  function repeatedList(){
    var out=[];
    for(var k in state.owned){ var n=state.owned[k]; for(var j=0;j<n-1;j++) out.push(parseInt(k,10)); }
    return out.sort(function(a,b){return a-b;});
  }

  /* ---------- Render ---------- */
  function renderStats(){
    var c = counts();
    $("stHave").textContent = c.have;
    $("stMiss").textContent = c.miss;
    $("stRep").textContent  = c.rep;
    $("bar").style.width = state.total ? (c.have/state.total*100).toFixed(1)+"%" : "0%";
    $("albumName").textContent = state.name;
    $("albumSub").textContent  = c.have + " de " + state.total + " coladas";
  }

  function renderGrid(){
    var g = $("grid"); g.innerHTML="";
    var any=false;
    for(var i=1;i<=state.total;i++){
      var have = state.owned[i]||0;
      var show =
        filter==="all" ||
        (filter==="have" && have>0) ||
        (filter==="miss" && have===0) ||
        (filter==="rep"  && have>1);
      if(!show) continue;
      any=true;
      var c = document.createElement("div");
      c.className = "cell" + (have>0 ? " have":"");
      c.textContent = i;
      c.dataset.n = i;
      if(have>1){
        var b=document.createElement("span"); b.className="badge"; b.textContent="x"+have; c.appendChild(b);
      }
      g.appendChild(c);
    }
    if(!any){ g.innerHTML='<div class="empty" style="grid-column:1/-1">Nada por aqui ainda 🙂</div>'; }
  }

  function renderChips(){
    var box = $("chips"); box.innerHTML="";
    if(!pending.length){ box.innerHTML='<span class="empty" style="padding:6px">Nenhum número detectado — adicione manualmente abaixo.</span>'; return; }
    pending.forEach(function(n){
      var dup = state.owned[n]>0;
      var c = document.createElement("span");
      c.className = "chip" + (dup?" dup":"");
      c.innerHTML = (dup?'<i class="fa-solid fa-repeat" style="font-size:11px"></i> ':'') + n + ' <x data-n="'+n+'">&times;</x>';
      box.appendChild(c);
    });
  }

  function renderAll(){ renderStats(); renderGrid(); }

  /* ---------- Câmera ---------- */
  function openCamera(){
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      toast("Câmera indisponível — use 'Escolher foto'"); return;
    }
    navigator.mediaDevices.getUserMedia({ video:{ facingMode:{ ideal:"environment" } }, audio:false })
      .then(function(s){
        stream = s; $("video").srcObject = s; $("stage").classList.add("on");
      })
      .catch(function(){ toast("Não consegui abrir a câmera — use 'Escolher foto'"); });
  }
  function closeCamera(){
    if(stream){ stream.getTracks().forEach(function(t){t.stop();}); stream=null; }
    $("stage").classList.remove("on");
  }
  function capture(){
    var v = $("video");
    if(!v.videoWidth){ toast("Aguarde a câmera focar…"); return; }
    var cv = document.createElement("canvas");
    cv.width = v.videoWidth; cv.height = v.videoHeight;
    cv.getContext("2d").drawImage(v,0,0);
    closeCamera();
    cv.toBlob(function(b){ runOCR(b); }, "image/jpeg", 0.92);
  }

  /* ---------- OCR ---------- */
  function runOCR(imageSource){
    $("confirm").classList.remove("on");
    $("ocrBox").classList.add("on");
    $("ocrText").textContent = "Carregando leitor…";

    if(typeof Tesseract === "undefined"){
      $("ocrBox").classList.remove("on");
      toast("Leitor não carregou (sem internet?). Adicione os nºs na mão.");
      pending = []; $("confirm").classList.add("on"); renderChips();
      return;
    }

    Tesseract.recognize(imageSource, "eng", {
      logger:function(m){
        if(m.status==="recognizing text"){
          $("ocrText").textContent = "Lendo números… " + Math.round(m.progress*100) + "%";
        }
      }
    }).then(function(res){
      var found = parseNumbers(res.data.text);
      $("ocrBox").classList.remove("on");
      pending = found;
      $("confirm").classList.add("on");
      renderChips();
      $("confirm").scrollIntoView({behavior:"smooth", block:"center"});
      toast(found.length ? ("Detectei "+found.length+" número(s)") : "Não li nenhum número — adicione na mão");
    }).catch(function(){
      $("ocrBox").classList.remove("on");
      pending = []; $("confirm").classList.add("on"); renderChips();
      toast("Falha ao ler — adicione os números manualmente");
    });
  }

  // extrai números 1..total do texto bruto do OCR
  function parseNumbers(text){
    var raw = (text||"").match(/\d+/g) || [];
    var set = {};
    raw.forEach(function(tok){
      var n = parseInt(tok,10);
      if(n>=1 && n<=state.total) set[n]=true;
    });
    return Object.keys(set).map(Number).sort(function(a,b){return a-b;});
  }

  /* ---------- Ações ---------- */
  function addPending(n){
    n = parseInt(n,10);
    if(!n || n<1 || n>state.total){ toast("Número deve ser entre 1 e "+state.total); return; }
    if(pending.indexOf(n)===-1) pending.push(n);
    pending.sort(function(a,b){return a-b;});
    renderChips();
  }
  function removePending(n){
    n = parseInt(n,10);
    var i = pending.indexOf(n); if(i>-1) pending.splice(i,1);
    renderChips();
  }
  function savePending(){
    if(!pending.length){ toast("Nada pra salvar"); return; }
    var novas=0, reps=0;
    pending.forEach(function(n){
      if(state.owned[n]){ state.owned[n]++; reps++; }
      else { state.owned[n]=1; novas++; }
    });
    save(); pending=[]; renderChips(); renderAll();
    $("confirm").classList.remove("on");
    toast(novas+" nova(s) · "+reps+" repetida(s)");
  }

  // toque na grade alterna posse (+1 / zera)
  function toggleCell(n){
    if(state.owned[n]){ delete state.owned[n]; }
    else { state.owned[n]=1; }
    save(); renderAll();
  }

  /* ---------- Compartilhar ---------- */
  function shareText(title, list){
    if(!list.length){ toast("Lista vazia 🎉"); return; }
    var txt = title + " ("+list.length+"): " + list.join(", ");
    if(navigator.share){
      navigator.share({ title:state.name, text:txt }).catch(function(){});
    } else if(navigator.clipboard){
      navigator.clipboard.writeText(txt).then(function(){ toast("Copiado! Cole na conversa da troca"); });
    } else {
      prompt("Copie a lista:", txt);
    }
  }

  /* ---------- Settings ---------- */
  function openSettings(){
    $("setName").value = state.name;
    $("setTotal").value = state.total;
    $("settings").classList.add("on");
  }
  function saveSettings(){
    var name = $("setName").value.trim() || "Meu álbum";
    var total = parseInt($("setTotal").value,10) || state.total;
    if(total<1) total=1;
    state.name = name; state.total = total;
    save(); $("settings").classList.remove("on"); renderAll();
    toast("Configurações salvas");
  }
  function resetAll(){
    if(confirm("Apagar TODA a coleção? Não dá pra desfazer.")){
      state.owned = {}; save(); $("settings").classList.remove("on"); renderAll();
      toast("Coleção zerada");
    }
  }

  /* ---------- Eventos ---------- */
  $("btnCamera").onclick = openCamera;
  $("btnCloseCam").onclick = closeCamera;
  $("btnCapture").onclick = capture;
  $("btnFile").onclick = function(){ $("fileInput").click(); };
  $("fileInput").onchange = function(e){
    var f = e.target.files[0]; if(f) runOCR(f); e.target.value="";
  };

  $("btnAdd").onclick = function(){ addPending($("addNum").value); $("addNum").value=""; $("addNum").focus(); };
  $("addNum").onkeydown = function(e){ if(e.key==="Enter"){ $("btnAdd").click(); } };
  $("btnSave").onclick = savePending;

  $("chips").onclick = function(e){
    if(e.target.tagName==="X"){ removePending(e.target.dataset.n); }
  };
  $("grid").onclick = function(e){
    var c = e.target.closest(".cell"); if(c) toggleCell(parseInt(c.dataset.n,10));
  };

  $("filters").onclick = function(e){
    var b = e.target.closest("button"); if(!b) return;
    filter = b.dataset.f;
    [].forEach.call($("filters").children, function(x){ x.classList.toggle("active", x===b); });
    renderGrid();
  };

  $("btnShareMiss").onclick = function(){ shareText("Figurinhas que FALTAM", missingList()); };
  $("btnShareRep").onclick  = function(){ shareText("Repetidas pra TROCAR", repeatedList()); };

  $("btnSettings").onclick = openSettings;
  $("btnCancelSet").onclick = function(){ $("settings").classList.remove("on"); };
  $("btnSaveSet").onclick = saveSettings;
  $("btnReset").onclick = resetAll;
  $("settings").onclick = function(e){ if(e.target.id==="settings") $("settings").classList.remove("on"); };

  /* ---------- PWA ---------- */
  if("serviceWorker" in navigator){
    navigator.serviceWorker.register("sw.js").catch(function(){});
  }

  /* ---------- Start ---------- */
  renderAll();
  renderChips();
})();
</script>
</body>
