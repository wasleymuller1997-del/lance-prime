<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Serial · Fones</title>
<meta name="description" content="Leia o serial number dos fones com a câmera e guarde tudo numa lista — copiar, compartilhar e exportar." />
<link rel="manifest" href="manifest-fones.json" />
<meta name="theme-color" content="#0b0d17" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<style>
  :root{
    --bg:#0b0d17; --card:#12152a; --line:rgba(255,255,255,.08);
    --txt:#eef0ff; --mut:#8b90b5;
    --roxo:#6c5ce7; --cyan:#00cec9;
    --grad:linear-gradient(135deg,#6c5ce7,#00cec9);
    --ok:#2ecc71; --warn:#f39c12; --bad:#ff6b6b;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--txt);font-family:"Plus Jakarta Sans",sans-serif;min-height:100%}
  body{padding:14px 14px calc(24px + env(safe-area-inset-bottom));max-width:560px;margin:0 auto}
  h1,h2,.num{font-family:"Space Grotesk",sans-serif}
  button{font-family:inherit;cursor:pointer;border:none}
  input{font-family:inherit}

  /* ---------- Header ---------- */
  header{display:flex;align-items:center;gap:12px;margin:4px 0 14px}
  .logo{width:42px;height:42px;border-radius:12px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:19px;color:#fff;flex:none}
  header h1{font-size:19px;line-height:1.15}
  header p{font-size:12px;color:var(--mut)}
  .count{margin-left:auto;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 12px;text-align:center;flex:none}
  .count b{display:block;font-family:"Space Grotesk";font-size:18px;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .count span{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.4px}

  /* ---------- Ações principais ---------- */
  .tools{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
  .tool{background:var(--card);border:1px solid var(--line);border-radius:12px;color:var(--txt);
        padding:12px 6px;display:flex;flex-direction:column;align-items:center;gap:6px;font-size:12px;font-weight:600}
  .tool i{font-size:17px;color:var(--cyan)}
  .tool.primary{background:var(--grad);border:none}
  .tool.primary i{color:#fff}
  .tool:active{transform:scale(.97)}

  /* ---------- Câmera ---------- */
  .stage{display:none;position:relative;border-radius:14px;overflow:hidden;background:#000;margin-bottom:12px}
  .stage.on{display:block}
  .stage video{width:100%;display:block;max-height:56vh;object-fit:cover;transform-origin:center}
  .stage .aim{position:absolute;left:6%;right:6%;top:50%;height:26%;transform:translateY(-50%);
    border:2px solid rgba(255,255,255,.85);border-radius:10px;box-shadow:0 0 0 2000px rgba(0,0,0,.45);pointer-events:none}
  .stage .aim .scanline{position:absolute;left:4%;right:4%;top:12%;height:2px;border-radius:2px;
    background:var(--grad);opacity:.85;animation:sweep 1.5s ease-in-out infinite alternate}
  .stage .aim.read .scanline{animation-duration:.6s}
  @keyframes sweep{0%{top:12%}100%{top:84%}}
  .stage .close{position:absolute;top:10px;right:10px;width:38px;height:38px;border-radius:50%;
    background:rgba(0,0,0,.55);color:#fff;font-size:16px;z-index:3}
  .stage .status{position:absolute;top:10px;left:10px;right:58px;z-index:3;font-size:12px;font-weight:600;
    background:rgba(0,0,0,.55);border-radius:10px;padding:8px 10px;color:#fff}
  .stage .status.ok{color:#7dffb0}
  .stage .status.reading{color:#8ef5f1}
  .stage .bar{position:absolute;left:0;right:0;bottom:0;z-index:3;display:flex;align-items:center;gap:8px;
    padding:10px;background:linear-gradient(transparent,rgba(0,0,0,.72))}
  .stage .shoot{flex:1;background:var(--grad);color:#fff;border-radius:12px;padding:13px;font-size:14px;font-weight:700}
  .stage .zbtn{width:44px;height:44px;border-radius:12px;background:rgba(0,0,0,.55);color:#fff;font-size:15px;flex:none}
  .stage .zbtn.autob.on{background:var(--grad)}
  .stage .zval{color:#fff;font-size:12px;font-weight:700;min-width:34px;text-align:center;flex:none}

  /* ---------- OCR progress ---------- */
  .ocr{display:none;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:12px;margin-bottom:12px;font-size:13px}
  .ocr.on{display:flex}
  .ocr .spin{width:18px;height:18px;border:3px solid var(--line);border-top-color:var(--cyan);
    border-radius:50%;animation:rot .8s linear infinite;flex:none}
  @keyframes rot{to{transform:rotate(360deg)}}

  /* ---------- Candidatos (quando a leitura é ambígua) ---------- */
  .cands{display:none;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:12px}
  .cands.on{display:block}
  .cands p{font-size:12px;color:var(--mut);margin-bottom:8px}
  .cands .chips{display:flex;flex-wrap:wrap;gap:8px}
  .cands .chip{background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--txt);
    border-radius:10px;padding:9px 12px;font-family:"Space Grotesk";font-size:14px;letter-spacing:.5px}
  .cands .chip:active{background:var(--grad)}

  /* ---------- Manual ---------- */
  .manual{display:none;gap:8px;margin-bottom:12px}
  .manual.on{display:flex}
  .manual input{flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;color:var(--txt);
    padding:12px;font-size:15px;font-family:"Space Grotesk";letter-spacing:1px;text-transform:uppercase;min-width:0}
  .manual button{background:var(--grad);color:#fff;border-radius:12px;padding:0 18px;font-size:15px;font-weight:700;flex:none}

  /* ---------- Lista ---------- */
  .listbar{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .listbar input{flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;color:var(--txt);
    padding:10px 12px;font-size:13px;min-width:0}
  .listbar input::placeholder{color:var(--mut)}
  .iconb{width:40px;height:40px;border-radius:12px;background:var(--card);border:1px solid var(--line);
    color:var(--cyan);font-size:14px;flex:none}
  .iconb:active{transform:scale(.94)}
  .item{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:8px;
    display:flex;align-items:center;gap:10px;animation:pop .18s ease}
  @keyframes pop{from{transform:scale(.97);opacity:.4}to{transform:scale(1);opacity:1}}
  .item .info{flex:1;min-width:0}
  .item .sn{font-family:"Space Grotesk";font-size:16px;font-weight:600;letter-spacing:1px;word-break:break-all}
  .item .meta{font-size:11px;color:var(--mut);margin-top:3px}
  .item .meta .note{color:var(--cyan)}
  .item.dup{border-color:rgba(243,156,18,.5)}
  .item.dup .sn::after{content:" repetido";font-family:"Plus Jakarta Sans";font-size:10px;font-weight:700;
    color:var(--warn);letter-spacing:.3px;vertical-align:middle}
  .item .act{display:flex;gap:6px;flex:none}
  .item .act button{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.05);color:var(--mut);font-size:13px}
  .item .act button:active{color:var(--txt)}
  .empty{text-align:center;color:var(--mut);font-size:13px;padding:34px 16px;background:var(--card);
    border:1px dashed var(--line);border-radius:12px}
  .empty i{display:block;font-size:26px;margin-bottom:10px;color:var(--roxo)}

  /* ---------- Toast ---------- */
  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(80px);z-index:60;
    background:#1c2040;border:1px solid var(--line);color:var(--txt);padding:11px 16px;border-radius:12px;
    font-size:13px;font-weight:600;opacity:0;transition:.25s;max-width:88vw;text-align:center;pointer-events:none}
  #toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  body.scanning #toast{bottom:auto;top:14px}
</style>
</head>
<body>

<header>
  <div class="logo"><i class="fa-solid fa-headphones"></i></div>
  <div>
    <h1>Serial · Fones</h1>
    <p>Aponte a câmera no serial number e pronto</p>
  </div>
  <div class="count"><b id="count">0</b><span>na lista</span></div>
</header>

<div class="tools">
  <button class="tool primary" id="btnCamera"><i class="fa-solid fa-camera"></i><span>Escanear</span></button>
  <button class="tool" id="btnFoto"><i class="fa-solid fa-image"></i><span>Foto</span></button>
  <button class="tool" id="btnManual"><i class="fa-solid fa-keyboard"></i><span>Digitar</span></button>
</div>
<input type="file" id="file" accept="image/*" hidden />

<div class="stage" id="stage">
  <video id="video" autoplay playsinline muted></video>
  <div class="aim" id="aim"><div class="scanline"></div></div>
  <div class="status" id="status">Aponte o código de barras do serial</div>
  <button class="close" id="btnClose"><i class="fa-solid fa-xmark"></i></button>
  <div class="bar">
    <button class="zbtn" id="zMinus"><i class="fa-solid fa-minus"></i></button>
    <span class="zval" id="zoomVal">1.0×</span>
    <button class="zbtn" id="zPlus"><i class="fa-solid fa-plus"></i></button>
    <button class="zbtn autob" id="btnAuto" title="Leitura automática"><i class="fa-solid fa-wand-magic-sparkles"></i></button>
    <button class="shoot" id="btnShoot"><i class="fa-solid fa-bolt"></i> Ler agora</button>
  </div>
</div>

<div class="ocr" id="ocrBox"><div class="spin"></div><span id="ocrText">Lendo o serial…</span></div>

<div class="cands" id="cands">
  <p>Li mais de um código — toque no que é o serial:</p>
  <div class="chips" id="candChips"></div>
</div>

<div class="manual" id="manual">
  <input id="mIn" placeholder="Ex.: H2XKF0ABC123" autocapitalize="characters" autocomplete="off" spellcheck="false" />
  <button id="mAdd">Salvar</button>
</div>

<div class="listbar">
  <input id="search" placeholder="Buscar na lista…" />
  <button class="iconb" id="btnCopyAll" title="Copiar tudo"><i class="fa-solid fa-copy"></i></button>
  <button class="iconb" id="btnShare" title="Compartilhar"><i class="fa-solid fa-share-nodes"></i></button>
  <button class="iconb" id="btnCsv" title="Exportar CSV"><i class="fa-solid fa-file-csv"></i></button>
  <button class="iconb" id="btnClear" title="Limpar lista"><i class="fa-solid fa-trash"></i></button>
</div>

<div id="list"></div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
<script>
(function(){
  "use strict";
  function $(id){ return document.getElementById(id); }

  /* ---------- Estado (localStorage) ---------- */
  var KEY = "fones_serials_v1";
  var items = [];            // [{sn, ts, note}] — mais novo primeiro
  try{ items = JSON.parse(localStorage.getItem(KEY) || "[]"); }catch(e){ items = []; }
  function save(){ try{ localStorage.setItem(KEY, JSON.stringify(items)); }catch(e){} }

  /* ---------- Toast / feedback ---------- */
  var toastT = null;
  function toast(msg){
    var t = $("toast"); t.textContent = msg; t.classList.add("on");
    clearTimeout(toastT); toastT = setTimeout(function(){ t.classList.remove("on"); }, 2200);
  }
  function beep(ok){
    if(navigator.vibrate) navigator.vibrate(ok ? [18,30,18] : 60);
    try{
      if(!beep.ctx) beep.ctx = new (window.AudioContext||window.webkitAudioContext)();
      var c = beep.ctx, o = c.createOscillator(), g = c.createGain();
      o.frequency.value = ok ? 1150 : 300; g.gain.value = .08;
      o.connect(g); g.connect(c.destination); o.start();
      o.stop(c.currentTime + (ok ? .12 : .2));
    }catch(e){}
  }

  /* ---------- Lista ---------- */
  function fmtTs(ts){
    var d = new Date(ts);
    return ("0"+d.getDate()).slice(-2)+"/"+("0"+(d.getMonth()+1)).slice(-2)+" "+
           ("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2);
  }
  function esc(s){ return String(s).replace(/[&<>"]/g, function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]; }); }
  function render(){
    $("count").textContent = items.length;
    var q = $("search").value.trim().toUpperCase();
    var list = $("list"); list.innerHTML = "";
    // marca repetidos considerando a lista inteira (não só o filtro da busca):
    // a leitura mais ANTIGA fica limpa, as cópias novas ganham a etiqueta "repetido"
    var dupCount = {}, seenSoFar = {};
    items.forEach(function(it){ dupCount[it.sn] = (dupCount[it.sn]||0)+1; });
    var shown = 0;
    items.forEach(function(it, idx){
      seenSoFar[it.sn] = (seenSoFar[it.sn]||0)+1;
      if(q && it.sn.indexOf(q) < 0 && (it.note||"").toUpperCase().indexOf(q) < 0) return;
      shown++;
      var isDup = dupCount[it.sn] > 1 && seenSoFar[it.sn] < dupCount[it.sn];
      var el = document.createElement("div");
      el.className = "item" + (isDup ? " dup" : "");
      el.innerHTML =
        '<div class="info"><div class="sn">'+esc(it.sn)+'</div>'+
        '<div class="meta">'+fmtTs(it.ts)+(it.note ? ' · <span class="note">'+esc(it.note)+'</span>' : '')+'</div></div>'+
        '<div class="act">'+
        '<button data-a="copy" title="Copiar"><i class="fa-solid fa-copy"></i></button>'+
        '<button data-a="note" title="Anotação"><i class="fa-solid fa-pen"></i></button>'+
        '<button data-a="del" title="Apagar"><i class="fa-solid fa-trash"></i></button></div>';
      el.querySelector('[data-a=copy]').onclick = function(){ copy(it.sn); };
      el.querySelector('[data-a=note]').onclick = function(){
        var n = prompt("Anotação pra esse serial (modelo, cor, cliente…):", it.note || "");
        if(n !== null){ it.note = n.trim(); save(); render(); }
      };
      el.querySelector('[data-a=del]').onclick = function(){
        items.splice(idx, 1); save(); render(); toast("Apagado");
      };
      list.appendChild(el);
    });
    if(!shown){
      list.innerHTML = '<div class="empty"><i class="fa-solid fa-barcode"></i>'+
        (items.length ? "Nada com essa busca." :
         "Nenhum serial ainda.<br/>Toque em <b>Escanear</b> e aponte pro <b>código de barras do Serial No.</b> na caixa do fone — ou pro texto do serial.")+'</div>';
    }
  }
  function copy(text){
    function done(){ toast("Copiado ✓"); }
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(done).catch(function(){ legacyCopy(text); done(); });
    } else { legacyCopy(text); done(); }
  }
  function legacyCopy(text){
    var ta = document.createElement("textarea"); ta.value = text;
    document.body.appendChild(ta); ta.select();
    try{ document.execCommand("copy"); }catch(e){}
    document.body.removeChild(ta);
  }
  var lastScanSn = null, lastScanTs = 0;
  function addSerial(sn, fromScan){
    sn = String(sn || "").toUpperCase().replace(/[^A-Z0-9\-\/]/g, "");
    if(sn.length < 6){ toast("Serial muito curto — confere aí"); return false; }
    // no scanner contínuo, o mesmo código apontado fica sendo lido de novo:
    // segura a repetição por alguns segundos em vez de duplicar na lista
    var now = Date.now();
    if(fromScan && sn === lastScanSn && (now - lastScanTs) < 6000){
      lastScanTs = now; scanOk(); setStatus("Já li esse ✓ — mova pro próximo", "ok"); return true;
    }
    if(fromScan){ lastScanSn = sn; lastScanTs = now; scanOk(); }
    var dup = items.some(function(it){ return it.sn === sn; });
    items.unshift({ sn: sn, ts: Date.now(), note: "" });
    save(); render();
    beep(true);
    toast(dup ? "⚠️ " + sn + " — JÁ ESTAVA na lista (repetido)" : "✓ " + sn + " salvo");
    if(fromScan) setStatus(dup ? "Repetido ⚠️ — já estava na lista" : "Leu ✓ — pode ir pro próximo", "ok");
    return true;
  }

  /* ---------- Extração de serial do texto OCR ---------- */
  // Aceita blocos alfanuméricos de 8–22 caracteres com letra E número juntos
  // (cara de serial: H2XKF0ABC123, GKXJ2LPHLX2F…). Ignora palavras soltas e
  // códigos óbvios de outra coisa (EAN numérico puro fica por último).
  var STOP = /^(SERIAL|NUMBER|MODEL|MODELO|DESIGNED|ASSEMBLED|CHARGING|WIRELESS|BLUETOOTH|PRODUCT|AIRPODS|EARBUDS|HEADPHONE|CALIFORNIA|APPLE|CHINA|BRASIL|ANATEL|IMPORTADO|FABRICADO)$/;
  function extractCandidates(text){
    var up = (text || "").toUpperCase();
    var lines = up.split(/\n+/);
    var cands = [], seen = {};
    function push(tok, score){
      tok = tok.replace(/[^A-Z0-9\-\/]/g, "");
      if(tok.length < 8 || tok.length > 22) return;
      if(STOP.test(tok)) return;
      var letters = (tok.match(/[A-Z]/g)||[]).length, digits = (tok.match(/[0-9]/g)||[]).length;
      if(!digits) return;                       // serial sem número não existe
      if(!letters) score -= 2;                  // só número: provável EAN/código de barras
      if(letters && digits) score += 2;         // mistura = cara de serial
      if(tok.length >= 10 && tok.length <= 14) score += 1;  // tamanho típico (Apple = 10–12)
      if(seen[tok] == null || seen[tok] < score){ seen[tok] = score; }
    }
    lines.forEach(function(line){
      // linha com "SERIAL", "S/N", "SN:" ganha prioridade máxima
      var hot = /SERIAL|S\/N|\bSN\b|N[ºO°]?\s*DE\s*S[EÉ]RIE/.test(line) ? 4 : 0;
      var clean = line.replace(/SERIAL(\s*(NO|NUMBER|N[ºO°]))?\.?:?/g, " ")
                      .replace(/\bS\/N\b\.?:?/g, " ").replace(/\bSN\b\.?:?/g, " ");
      (clean.match(/[A-Z0-9\-\/]{6,}/g) || []).forEach(function(tok){ push(tok, hot); });
    });
    for(var k in seen) cands.push({ sn:k, score:seen[k] });
    cands.sort(function(a,b){ return b.score - a.score; });
    return cands;
  }
  function handleOcrText(text){
    var cands = extractCandidates(text);
    if(!cands.length){ scanFail(); beep(false); toast("Não achei serial — chega mais perto ou aumenta o zoom"); setStatus("Não li — tenta de novo", ""); return; }
    var best = cands[0];
    // 1 candidato, ou o melhor bem na frente dos outros → salva direto
    if(cands.length === 1 || best.score >= cands[1].score + 2){ addSerial(best.sn, true); return; }
    // ambíguo: mostra os chips pro usuário escolher
    var box = $("cands"), chips = $("candChips"); chips.innerHTML = "";
    cands.slice(0, 5).forEach(function(c){
      var b = document.createElement("button");
      b.className = "chip"; b.textContent = c.sn;
      b.onclick = function(){ box.classList.remove("on"); addSerial(c.sn, true); };
      chips.appendChild(b);
    });
    box.classList.add("on");
    scanOk();   // desarma o auto enquanto você escolhe o chip
    beep(true); setStatus("Escolha o serial na lista abaixo", "ok");
  }

  /* ---------- Código de barras (ZXing): leitura EXATA do serial ----------
     Na etiqueta Apple, o código de barras ao lado de "(S) Serial No." carrega o
     próprio serial (Code128, às vezes com "S" na frente). Ler ele é infalível —
     o OCR fica só de reserva. UPC/EAN ficam FORA dos formatos de propósito,
     pra o código do produto nunca ser confundido com o serial. */
  function rotateCanvas(src, deg){
    var r = document.createElement("canvas");
    if(deg === 180){ r.width = src.width; r.height = src.height; }
    else { r.width = src.height; r.height = src.width; }
    var c = r.getContext("2d");
    c.translate(r.width/2, r.height/2); c.rotate(deg*Math.PI/180);
    c.drawImage(src, -src.width/2, -src.height/2);
    return r;
  }
  var zxReader = null;
  function getZx(){
    if(typeof ZXing === "undefined") return null;
    if(!zxReader){
      var hints = new Map();
      hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
        ZXing.BarcodeFormat.CODE_128, ZXing.BarcodeFormat.CODE_39,
        ZXing.BarcodeFormat.QR_CODE, ZXing.BarcodeFormat.DATA_MATRIX
      ]);
      hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
      zxReader = new ZXing.MultiFormatReader();
      zxReader.setHints(hints);
    }
    return zxReader;
  }
  function decodeBarcode(cv){
    var r = getZx(); if(!r) return null;
    try{
      var lum = new ZXing.HTMLCanvasElementLuminanceSource(cv);
      var bmp = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(lum));
      var res = r.decode(bmp);
      return res && res.getText ? res.getText() : null;
    }catch(e){ return null; }
    finally{ try{ r.reset(); }catch(e){} }
  }
  function serialFromBarcode(text){
    if(!text) return null;
    var t = String(text).toUpperCase().replace(/\s+/g, "");
    if(/:\/\/|WWW\.|\.COM/.test(t)) return null;      // QR com link não é serial
    if(/^SN[A-Z0-9]{10,}$/.test(t)) t = t.slice(2);   // algumas marcas: "SN" + serial
    else if(/^S[A-Z0-9]{10,}$/.test(t)) t = t.slice(1); // Apple: "S" + serial no Code128
    t = t.replace(/[^A-Z0-9\-\/]/g, "");
    if(t.length < 8 || t.length > 22) return null;
    if(/^[0-9\-]+$/.test(t)) return null;             // só número = EAN/UPC, não serial
    return t;
  }
  function tryBarcodes(cv){
    // tenta na orientação normal e girado 90° (etiqueta na vertical, como na caixa)
    var sn = serialFromBarcode(decodeBarcode(cv));
    if(!sn) sn = serialFromBarcode(decodeBarcode(rotateCanvas(cv, 90)));
    if(sn){ addSerial(sn, true); return true; }
    return false;
  }

  /* ---------- Leitura por IA (backend): lê a etiqueta inteira ---------- */
  function canvasToDataURL(src, maxW){
    if(src.width <= maxW) return src.toDataURL("image/jpeg", 0.85);
    var sc = maxW/src.width, t = document.createElement("canvas");
    t.width = maxW; t.height = Math.round(src.height*sc);
    t.getContext("2d").drawImage(src, 0, 0, t.width, t.height);
    return t.toDataURL("image/jpeg", 0.85);
  }
  function aiScan(cv){
    return fetch("/api/fones/scan", { method:"POST", headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ image: canvasToDataURL(cv, 1100) }) })
      .then(function(r){ return r.json(); })
      .then(function(r){ return (r && r.success && r.serial) ? r.serial : null; });
  }
  // Ordem de leitura: 1º código de barras (exato, instantâneo, offline),
  // 2º IA no backend (lê etiqueta torta/desfocada), 3º OCR local (reserva).
  function smartRead(cv, ocrFallback){
    if(tryBarcodes(cv)) return;
    if(reading) return; reading = true;
    $("ocrBox").classList.add("on"); $("ocrText").textContent = "Lendo com IA…";
    aiScan(cv).then(function(sn){
      reading = false; $("ocrBox").classList.remove("on");
      if(sn) addSerial(sn, true);
      else ocrFallback();
    }).catch(function(){
      reading = false; $("ocrBox").classList.remove("on");
      ocrFallback();
    });
  }

  /* ---------- OCR (Tesseract local, com passada invertida) ---------- */
  var ocrWorker = null;
  function getOcrWorker(){
    if(ocrWorker) return Promise.resolve(ocrWorker);
    return Tesseract.createWorker("eng").then(function(w){
      return w.setParameters({
        tessedit_char_whitelist: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-/:. ",
        tessedit_pageseg_mode: "6"
      }).then(function(){ ocrWorker = w; return w; });
    });
  }
  function invertCanvas(src){
    var r = document.createElement("canvas"); r.width = src.width; r.height = src.height;
    var c = r.getContext("2d"); c.drawImage(src, 0, 0);
    try{
      var img = c.getImageData(0,0,r.width,r.height), d = img.data;
      for(var i=0;i<d.length;i+=4){ d[i]=255-d[i]; d[i+1]=255-d[i+1]; d[i+2]=255-d[i+2]; }
      c.putImageData(img,0,0);
    }catch(e){}
    return r;
  }
  function bestOf(t1, t2){
    // fica com o texto cuja extração rendeu candidato mais forte
    var c1 = extractCandidates(t1), c2 = extractCandidates(t2);
    var s1 = c1.length ? c1[0].score + c1.length*.1 : -9;
    var s2 = c2.length ? c2[0].score + c2.length*.1 : -9;
    return s2 > s1 ? t2 : t1;
  }
  var reading = false;
  // rots: rotações (graus) ainda por tentar quando não achar nada — foto da
  // galeria pode vir com o texto na vertical, aí gira e lê de novo.
  function recognizeCanvas(cv, rots, base){
    if(reading) return; reading = true;
    base = base || cv;
    if(typeof Tesseract === "undefined"){ reading = false; toast("Sem conexão — use Digitar"); return; }
    $("ocrBox").classList.add("on"); $("ocrText").textContent = "Lendo…"; $("aim").classList.add("read");
    getOcrWorker().then(function(w){
      return w.recognize(cv).then(function(r1){
        var t1 = r1.data.text || "";
        if(extractCandidates(t1).length) return t1;   // já achou: não gasta a 2ª passada
        return w.recognize(invertCanvas(cv)).then(function(r2){ return bestOf(t1, r2.data.text || ""); });
      });
    }).then(function(text){
      reading = false; $("ocrBox").classList.remove("on"); $("aim").classList.remove("read");
      if(!extractCandidates(text).length && rots && rots.length){
        recognizeCanvas(rotateCanvas(base, rots.shift()), rots, base); return;
      }
      handleOcrText(text);
    }).catch(function(){
      reading = false; $("ocrBox").classList.remove("on"); $("aim").classList.remove("read");
      scanFail(); toast("Falha ao ler — tenta de novo ou use Digitar");
    });
  }

  /* ---------- Realce do recorte (contraste) ---------- */
  function enhance(ctx, cv){
    try{
      var img = ctx.getImageData(0,0,cv.width,cv.height), d = img.data;
      var min = 255, max = 0;
      for(var i=0;i<d.length;i+=4){
        var g = 0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
        if(g<min) min=g; if(g>max) max=g;
      }
      var range = Math.max(1, max-min);
      for(var j=0;j<d.length;j+=4){
        var v = (0.299*d[j]+0.587*d[j+1]+0.114*d[j+2] - min) * 255/range;
        d[j]=d[j+1]=d[j+2]=v;
      }
      ctx.putImageData(img,0,0);
    }catch(e){}
  }

  /* ---------- Câmera ---------- */
  var stream = null, zoomF = 1;
  function applyZoom(){ $("video").style.transform = "scale("+zoomF+")"; $("zoomVal").textContent = zoomF.toFixed(1)+"×"; }
  function setZoom(z){ zoomF = Math.max(1, Math.min(4, Math.round(z*10)/10)); applyZoom(); }
  var statusHold = 0;
  function setStatus(msg, cls){
    var s = $("status"); s.textContent = msg; s.className = "status" + (cls ? " "+cls : "");
    if(cls) statusHold = Date.now() + 1400;
  }
  function openCamera(){
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){ toast("Câmera indisponível — use 'Foto'"); return; }
    navigator.mediaDevices.getUserMedia({ video:{ facingMode:{ ideal:"environment" }, width:{ ideal:1920 } }, audio:false })
      .then(function(s){
        stream = s; $("video").srcObject = s; $("stage").classList.add("on");
        document.body.classList.add("scanning");
        zoomF = 1; applyZoom(); syncAutoBtn();
        setStatus(autoOn ? "Aponte o código de barras do serial" : "Enquadre e toque em Ler agora", "");
        startAutoLoop();
      })
      .catch(function(){ toast("Não consegui abrir a câmera — use 'Foto'"); });
  }
  function closeCamera(){
    stopAutoLoop();
    if(stream){ stream.getTracks().forEach(function(t){ t.stop(); }); stream = null; }
    $("video").style.transform = ""; $("stage").classList.remove("on");
    document.body.classList.remove("scanning");
  }
  function buildCrop(){
    var v = $("video"); if(!v.videoWidth) return null;
    // recorta a faixa central; o zoom digital aperta o recorte (menor = mais perto)
    var vw = v.videoWidth, vh = v.videoHeight;
    var cw = Math.round(vw * 0.88/zoomF), ch = Math.round(vh * 0.26/zoomF);
    var cx = Math.round((vw-cw)/2), cy = Math.round((vh-ch)/2);
    var scale = 3;
    var cv = document.createElement("canvas");
    cv.width = cw*scale; cv.height = ch*scale;
    var ctx = cv.getContext("2d"); ctx.imageSmoothingEnabled = true;
    ctx.drawImage(v, cx, cy, cw, ch, 0, 0, cv.width, cv.height);
    enhance(ctx, cv);
    return cv;
  }
  function buildFull(){
    // quadro inteiro visível (respeitando o zoom digital), sem realce — o
    // binarizador do ZXing prefere a imagem crua
    var v = $("video"); if(!v.videoWidth) return null;
    var vw = v.videoWidth, vh = v.videoHeight;
    var cw = Math.round(vw/zoomF), ch = Math.round(vh/zoomF);
    var cx = Math.round((vw-cw)/2), cy = Math.round((vh-ch)/2);
    var sc = Math.min(1, 1280/cw);
    var cv = document.createElement("canvas");
    cv.width = Math.round(cw*sc); cv.height = Math.round(ch*sc);
    cv.getContext("2d").drawImage(v, cx, cy, cw, ch, 0, 0, cv.width, cv.height);
    return cv;
  }
  function capture(){
    if(reading) return;
    var full = buildFull();
    if(!full){ toast("Aguarde a câmera focar…"); return; }
    smartRead(full, function(){
      // reserva offline: OCR do texto na faixa central
      var cv = buildCrop();
      if(cv) recognizeCanvas(cv);   // NÃO fecha a câmera — modo sequência
    });
  }

  /* ---------- Auto-scan: segura firme e ele lê sozinho (com calma) ----------
     Regras pra não ficar "lendo igual doido":
     - depois que LEU um serial, desarma e só volta quando você MOVER a câmera
       pra outra caixa (ou tocar em "Ler agora");
     - se errar 3 tentativas seguidas no mesmo enquadramento, para de insistir
       e espera você ajeitar ou tocar no botão;
     - dá pra desligar o automático de vez no botão da varinha (fica salvo). */
  var autoOn = localStorage.getItem("fones_auto") !== "off";
  var autoArmed = true, autoFails = 0;
  var autoTimer = null, autoLastLum = null, autoSteady = 0, autoLastFire = 0;
  var AUTO_MOVE = 7, AUTO_CONTENT = 230, AUTO_COOLDOWN = 3000;
  var tinyCv = null, tinyCtx = null;
  function scanOk(){ autoArmed = false; autoFails = 0; }
  function scanFail(){
    autoFails++;
    if(autoFails >= 3){
      autoFails = 0; autoArmed = false;
      setStatus("Parei de tentar — ajeite o quadro ou toque em Ler agora", "ok");
    }
  }
  function syncAutoBtn(){
    $("btnAuto").classList.toggle("on", autoOn);
  }
  function startAutoLoop(){
    if(!tinyCv){ tinyCv = document.createElement("canvas"); tinyCv.width = 64; tinyCv.height = 16;
      tinyCtx = tinyCv.getContext("2d", { willReadFrequently:true }); }
    autoLastLum = null; autoSteady = 0; autoLastFire = 0; autoArmed = true; autoFails = 0;
    clearInterval(autoTimer); autoTimer = setInterval(autoTick, 150);
  }
  function stopAutoLoop(){ clearInterval(autoTimer); autoTimer = null; }
  function sampleTiny(){
    var v = $("video"); if(!v.videoWidth) return null;
    var vw = v.videoWidth, vh = v.videoHeight;
    var cw = vw*0.88/zoomF, ch = vh*0.26/zoomF, cx = (vw-cw)/2, cy = (vh-ch)/2;
    try{ tinyCtx.drawImage(v, cx, cy, cw, ch, 0, 0, 64, 16); }catch(e){ return null; }
    var d = tinyCtx.getImageData(0,0,64,16).data, n = 64*16, lum = new Float32Array(n), sum = 0;
    for(var i=0,j=0;i<d.length;i+=4,j++){ var g = 0.299*d[i]+0.587*d[i+1]+0.114*d[i+2]; lum[j]=g; sum+=g; }
    var mean = sum/n, varr = 0, motion = 0;
    for(var k=0;k<n;k++){ var dd = lum[k]-mean; varr += dd*dd; if(autoLastLum) motion += Math.abs(lum[k]-autoLastLum[k]); }
    varr /= n; motion = autoLastLum ? motion/n : 999;
    autoLastLum = lum;
    return { varr:varr, motion:motion };
  }
  function autoTick(){
    if(!stream || reading) return;
    var s = sampleTiny(); if(!s) return;
    var moving = s.motion > AUTO_MOVE, hasContent = s.varr > AUTO_CONTENT, now = Date.now();
    // mover a câmera re-arma o automático (foi pra próxima caixa)
    if(moving){ autoSteady = 0; autoArmed = true; autoFails = 0; } else { autoSteady++; }
    if(now >= statusHold){
      if(!autoOn) setStatus("Enquadre e toque em Ler agora", "");
      else if(!autoArmed) setStatus("Leu ✓ — mova pra próxima caixa", "ok");
      else if(moving) setStatus("Aponte o código de barras do serial", "");
      else if(!hasContent) setStatus("Enquadre o texto (aproxime / zoom)", "");
      else setStatus("Segure firme…", "");
    }
    if(autoOn && autoArmed && autoSteady >= 4 && hasContent && (now - autoLastFire) > AUTO_COOLDOWN){
      autoLastFire = now;
      setStatus("Lendo…", "reading");
      capture();
    }
  }

  /* ---------- Foto da galeria ---------- */
  function fileToCanvas(file){
    var img = new Image();
    img.onload = function(){
      var sc = Math.min(1, 1600/img.width);
      var cv = document.createElement("canvas");
      cv.width = Math.round(img.width*sc); cv.height = Math.round(img.height*sc);
      var ctx = cv.getContext("2d"); ctx.drawImage(img, 0, 0, cv.width, cv.height);
      smartRead(cv, function(){
        enhance(ctx, cv);
        recognizeCanvas(cv, [90, 270]);         // texto pode estar na vertical na foto
      });
    };
    img.onerror = function(){ toast("Não consegui abrir a imagem"); };
    img.src = URL.createObjectURL(file);
  }

  /* ---------- Exportar / compartilhar ---------- */
  function listText(){
    return items.map(function(it){ return it.sn + (it.note ? " — " + it.note : ""); }).join("\n");
  }
  function copyAll(){
    if(!items.length){ toast("Lista vazia"); return; }
    copy(listText());
  }
  function share(){
    if(!items.length){ toast("Lista vazia"); return; }
    var text = "Serial numbers dos fones ("+items.length+"):\n" + listText();
    if(navigator.share){ navigator.share({ text:text }).catch(function(){}); }
    else window.open("https://wa.me/?text=" + encodeURIComponent(text), "_blank");
  }
  function exportCsv(){
    if(!items.length){ toast("Lista vazia"); return; }
    var rows = ["serial;data;anotacao"];
    items.forEach(function(it){
      var d = new Date(it.ts);
      rows.push(it.sn + ";" + d.toLocaleDateString("pt-BR") + " " + d.toLocaleTimeString("pt-BR").slice(0,5) +
                ";" + (it.note||"").replace(/;/g, ","));
    });
    var blob = new Blob(["﻿" + rows.join("\n")], { type:"text/csv;charset=utf-8" });
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "serials-fones.csv";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    toast("CSV exportado ✓");
  }
  function clearAll(){
    if(!items.length){ toast("Lista já está vazia"); return; }
    if(!confirm("Apagar TODOS os " + items.length + " serials da lista?")) return;
    items = []; save(); render(); toast("Lista limpa");
  }

  /* ---------- Eventos ---------- */
  $("btnCamera").onclick = openCamera;
  $("btnClose").onclick = closeCamera;
  $("btnShoot").onclick = function(){ autoArmed = true; autoFails = 0; capture(); };
  $("btnAuto").onclick = function(){
    autoOn = !autoOn;
    localStorage.setItem("fones_auto", autoOn ? "on" : "off");
    syncAutoBtn();
    toast(autoOn ? "Leitura automática LIGADA" : "Leitura automática desligada — use o botão Ler agora");
  };
  $("zPlus").onclick = function(){ setZoom(zoomF + .5); };
  $("zMinus").onclick = function(){ setZoom(zoomF - .5); };
  $("btnFoto").onclick = function(){ $("file").click(); };
  $("file").onchange = function(){ var f = this.files[0]; this.value = ""; if(f) fileToCanvas(f); };
  $("btnManual").onclick = function(){
    var m = $("manual"); m.classList.toggle("on");
    if(m.classList.contains("on")) $("mIn").focus();
  };
  $("mAdd").onclick = function(){ if(addSerial($("mIn").value, false)) $("mIn").value = ""; };
  $("mIn").onkeydown = function(e){ if(e.key === "Enter") $("mAdd").click(); };
  $("search").oninput = render;
  $("btnCopyAll").onclick = copyAll;
  $("btnShare").onclick = share;
  $("btnCsv").onclick = exportCsv;
  $("btnClear").onclick = clearAll;
  document.addEventListener("visibilitychange", function(){ if(document.hidden) closeCamera(); });

  render();
  if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(function(){}); }
})();
</script>
</body>
</html>
