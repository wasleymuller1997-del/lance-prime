<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0d17"/>
      <stop offset="55%" stop-color="#0d1022"/>
      <stop offset="100%" stop-color="#11142b"/>
    </linearGradient>
    <radialGradient id="glowP" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#6c5ce7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowC" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00cec9" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#00cec9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- glows -->
  <circle cx="220" cy="30" r="240" fill="url(#glowP)"/>
  <circle cx="1000" cy="300" r="220" fill="url(#glowC)"/>

  <!-- brand pill -->
  <rect x="510" y="34" width="180" height="36" rx="18" fill="rgba(201,169,110,0.10)" stroke="rgba(201,169,110,0.40)" stroke-width="1"/>
  <circle cx="540" cy="52" r="5" fill="#e2c992"/>
  <text x="610" y="58" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" letter-spacing="2" fill="#e2c992" text-anchor="middle">LANCEPRIME</text>

  <!-- headline -->
  <text x="600" y="124" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="800" fill="#f5f5f5" text-anchor="middle">Achou, deu lance,</text>
  <text x="600" y="168" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="800" fill="#e2c992" text-anchor="middle">levou pra garagem</text>

  <!-- estrada -->
  <line x1="320" y1="282" x2="880" y2="282" stroke="rgba(201,169,110,0.25)" stroke-width="2"/>
  <g stroke="#c9a96e" stroke-width="3" stroke-linecap="round" opacity="0.5">
    <animateTransform attributeName="transform" attributeType="XML" type="translate" values="0 0;-90 0" dur="0.9s" repeatCount="indefinite"/>
    <line x1="380" y1="282" x2="410" y2="282"/>
    <line x1="470" y1="282" x2="500" y2="282"/>
    <line x1="560" y1="282" x2="590" y2="282"/>
    <line x1="650" y1="282" x2="680" y2="282"/>
    <line x1="740" y1="282" x2="770" y2="282"/>
    <line x1="830" y1="282" x2="860" y2="282"/>
  </g>

  <!-- speed lines -->
  <g stroke-linecap="round">
    <animateTransform attributeName="transform" attributeType="XML" type="translate" values="16 0;-24 0" dur="1.1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.9;0.15" dur="1.1s" repeatCount="indefinite"/>
    <line x1="372" y1="216" x2="432" y2="216" stroke="#6c5ce7" stroke-width="3" opacity="0.7"/>
    <line x1="360" y1="236" x2="436" y2="236" stroke="#00cec9" stroke-width="3" opacity="0.7"/>
    <line x1="378" y1="256" x2="430" y2="256" stroke="#6c5ce7" stroke-width="3" opacity="0.6"/>
  </g>

  <!-- carrinho -->
  <g stroke-linejoin="round">
    <animateTransform attributeName="transform" attributeType="XML" type="translate" values="0 0;0 -4;0 0" keyTimes="0;0.5;1" dur="2.4s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
    <path d="M 528 224 L 560 198 Q 564 194 572 194 L 648 194 Q 658 194 664 201 L 700 224 Z" fill="rgba(108,92,231,0.20)" stroke="#e2c992" stroke-width="2.5"/>
    <line x1="612" y1="196" x2="612" y2="224" stroke="#e2c992" stroke-width="2"/>
    <rect x="462" y="222" width="276" height="34" rx="13" fill="rgba(201,169,110,0.12)" stroke="#e2c992" stroke-width="2.5"/>
    <rect x="730" y="232" width="9" height="6" rx="2" fill="#ffffff" opacity="0.9"/>
    <circle cx="525" cy="258" r="20" fill="#0b0d17" stroke="#e2c992" stroke-width="3"/>
    <circle cx="525" cy="258" r="7.5" fill="#c9a96e"/>
    <circle cx="675" cy="258" r="20" fill="#0b0d17" stroke="#e2c992" stroke-width="3"/>
    <circle cx="675" cy="258" r="7.5" fill="#c9a96e"/>
  </g>
</svg>
